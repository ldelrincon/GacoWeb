name: Deploy Web to Server

on:
  workflow_dispatch:

env:
  BUILD_PATH: ./dist/gaco-web-jwt/browser
  DEPLOYMENT_PATH: /var/www/html
  BACKUP_BASE_PATH: /home/Respaldos/WEB
  MAX_BACKUPS: 5

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.19.0
          cache: 'npm'

      # 3️⃣ Install deps
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build
      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      # 5️⃣ Install Cloudflare WARP
      - name: Install Cloudflare WARP
        run: |
          sudo apt-get update
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | \
            sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | \
            sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update && sudo apt-get install -y cloudflare-warp

      # 6️⃣ Connect WARP
      - name: Configure and connect WARP
        env:
          WARP_CONNECTOR_TOKEN: 'eyJhIjoiOTVhYTFkODk1NjExODc5MmQ0MjY2YTJlZGU1MTBjZDgiWARPIjoiOTVhYTFkODk1NjExODc5MmQ0MjY2YTJlZGU1MTBjZDgiLCJ0IjoiMzU1YWJmZDQtNTA4Ni00MTliLWEwMTYtZDhkYThiODA3MjVkIiwicyI6InVxS25lQmwyeGpVbFgrbkRnRmRTdzltU0FML0hXQXBHUm8vQ1BmVGNzT0V0K2dpUXIxZ0hKaFljVXhXUk5vaHd0anQwQkJTR2FWNlM0bXBtVURIK0ZnPT0ifQ=='
        run: |
          script -q -c "warp-cli --accept-tos connector new '$WARP_CONNECTOR_TOKEN'" /dev/null || true
          script -q -c "warp-cli --accept-tos connect" /dev/null
          sleep 10

          for i in {1..20}; do
            STATUS=$(script -q -c "warp-cli --accept-tos status" /dev/null 2>&1 || echo "")
            echo "$STATUS"
            if echo "$STATUS" | grep -qi "connected"; then
              echo "WARP connected"
              break
            fi
            sleep 2
          done

      # 7️⃣ Deploy
      - name: Deploy to server
        env:
          SSH_USERNAME: root
          SSH_PASSWORD: v50llDtK
          SERVER_IP: 69.48.202.76
        run: |
          set -e

          sudo apt-get install -y sshpass rsync p7zip-full

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="backup_${TIMESTAMP}.7z"
          BACKUP_FULL_PATH="${{ env.BACKUP_BASE_PATH }}/$BACKUP_FILE"

          ssh_exec() {
            sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              "$SSH_USERNAME@$SERVER_IP" "$@"
          }

          echo "📡 Testing connection..."
          ssh_exec "echo Connected"

          echo "📁 Ensuring directories..."
          ssh_exec "mkdir -p ${{ env.BACKUP_BASE_PATH }} ${{ env.DEPLOYMENT_PATH }}"

          echo "💾 Creating backup (excluding /api)..."
          if ssh_exec "[ -d '${{ env.DEPLOYMENT_PATH }}' ] && [ \"\$(ls -A ${{ env.DEPLOYMENT_PATH }})\" ]"; then
            ssh_exec "cd ${{ env.DEPLOYMENT_PATH }} && \
              7z a -t7z -mx=5 $BACKUP_FULL_PATH . \
              -xr!api \
              -xr!*.log \
              -xr!*.tmp \
              && echo Backup created"
          else
            echo "No previous deployment found"
          fi

          echo "🧹 Rotating backups..."
          ssh_exec "cd ${{ env.BACKUP_BASE_PATH }} && \
            ls -1t backup_*.7z 2>/dev/null | tail -n +$((${{ env.MAX_BACKUPS }} + 1)) | \
            xargs -r rm -f || true"

          echo "🚀 Deploying new build (preserving /api)..."
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR" \
            --exclude='api/' \
            --progress \
            ${{ env.BUILD_PATH }}/ \
            "$SSH_USERNAME@$SERVER_IP:${{ env.DEPLOYMENT_PATH }}/"

          echo "🔐 Fixing permissions..."
          ssh_exec "chown -R www-data:www-data ${{ env.DEPLOYMENT_PATH }} && chmod -R 755 ${{ env.DEPLOYMENT_PATH }}"

          echo "✅ Deployment finished"

      # 8️⃣ Rollback
      - name: Rollback on failure
        if: failure()
        env:
          SSH_USERNAME: root
          SSH_PASSWORD: v50llDtK
          SERVER_IP: 69.48.202.76
        run: |
          echo "Deployment failed. Attempting rollback..."

          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no \
            "$SSH_USERNAME@$SERVER_IP" "
              LATEST_BACKUP=\$(ls -1t ${{ env.BACKUP_BASE_PATH }}/backup_*.7z 2>/dev/null | head -n 1)
              if [ -n \"\$LATEST_BACKUP\" ]; then
                echo Rolling back to \$LATEST_BACKUP
                find ${{ env.DEPLOYMENT_PATH }} -mindepth 1 -maxdepth 1 ! -name api -exec rm -rf {} +
                7z x \"\$LATEST_BACKUP\" -o${{ env.DEPLOYMENT_PATH }}
                echo Rollback complete
              else
                echo No backup found
              fi
            "

      # 9️⃣ Disconnect WARP
      - name: Disconnect WARP
        if: always()
        run: |
          warp-cli --accept-tos disconnect || true
          warp-cli --accept-tos delete || true
